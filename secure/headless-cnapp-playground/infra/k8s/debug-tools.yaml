---
# Attacker-controlled box INSIDE the cluster: acts as the C2 / reverse-shell
# listener and as the host the operator drives the kill chain from.
# Kept fully self-contained so the lab needs no external infrastructure.
apiVersion: v1
kind: Pod
metadata:
  name: debug-tools
  namespace: payments
  labels:
    app: debug-tools
spec:
  containers:
    - name: tools
      image: nicolaka/netshoot:latest
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
  restartPolicy: Always
