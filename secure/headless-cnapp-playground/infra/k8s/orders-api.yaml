---
# Victim namespace - looks like a normal app workload
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    app.kubernetes.io/part-of: acme-platform
---
# The "vulnerable" application code: a tiny HTTP server with a command-exec
# endpoint. This emulates a classic Tomcat-style webshell (tomcatwar.jsp?cmd=)
# so the attack can drive RCE over HTTP, exactly like a real exploited app.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-api-code
  namespace: payments
data:
  server.py: |
    import subprocess
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse, parse_qs

    APP = "OrderProcessor"

    class H(BaseHTTPRequestHandler):
        def _run(self, cmd):
            try:
                r = subprocess.run(["/bin/bash", "-lc", cmd],
                                   stdout=subprocess.PIPE,
                                   stderr=subprocess.STDOUT, timeout=120)
                return r.stdout
            except Exception as e:
                return str(e).encode()

        def _handle(self):
            q = parse_qs(urlparse(self.path).query)
            cmd = (q.get("cmd") or [None])[0]
            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            if cmd:
                self.wfile.write(self._run(cmd))
            else:
                self.wfile.write(("%s v1.2 ready\n" % APP).encode())

        def do_GET(self):
            self._handle()

        def do_POST(self):
            self._handle()

        def log_message(self, *a):
            return

    if __name__ == "__main__":
        HTTPServer(("0.0.0.0", 8080), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: payments
  labels:
    app: orders-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      # SA token is mounted (default) on purpose: credential-access demo
      automountServiceAccountToken: true
      containers:
        - name: app
          image: python:3.11-slim
          command: ["python3", "/app/server.py"]
          ports:
            - containerPort: 8080
          # Cloud creds injected as if the app were misconfigured with them.
          # Populated by deploy-k8s.sh from the lab's AWS credentials.
          envFrom:
            - secretRef:
                name: app-cloud-creds
                optional: true
          # Limits scope xmrig OOM kills to this container's cgroup
          # (CONSTRAINT_MEMCG) instead of triggering a global node OOM that
          # takes down the apiserver. 512 Mi is enough for xmrig to exec and
          # be detected by Sysdig before being killed; Python survives (~50 Mi).
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: code
              mountPath: /app
      volumes:
        - name: code
          configMap:
            name: orders-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: payments
spec:
  selector:
    app: orders-api
  ports:
    - port: 8080
      targetPort: 8080
